---
driver:
  name: vagrant

provisioner:
  name: chef_zero
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  install_strategy: once
  # enforce_idempotency: true
  multiple_converge: 2

client_rb:
  treat_deprecation_warnings_as_errors: true

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-12
  - name: fedora-latest
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list:
      - recipe[test::default]
    verifier:
      inspec_tests:
        - test/smoke/default
  - name: ulimit
    run_list:
      - recipe[test::default]
    verifier:
      inspec_tests:
        - test/smoke/ulimit
    attributes:
      stunnel:
        ulimit: 8192
  - name: certificates
    run_list:
      - recipe[test::certificates]
    verifier:
      inspec_tests:
        - test/smoke/certificates
  - name: source
    run_list:
      - recipe[test::default]
    verifier:
      inspec_tests:
        - test/smoke/source
    attributes:
      install_method: "source"
